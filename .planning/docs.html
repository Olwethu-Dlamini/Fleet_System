<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetScheduler Pro — Planning Documentation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1b26;
    --bg2: #16161e;
    --bg3: #1f2335;
    --border: #292e42;
    --text: #a9b1d6;
    --text-dim: #565f89;
    --accent: #7aa2f7;
    --accent2: #bb9af7;
    --green: #9ece6a;
    --yellow: #e0af68;
    --red: #f7768e;
    --cyan: #7dcfff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--bg);
  }

  header h1 { font-size: 15px; font-weight: 600; color: #c0caf5; letter-spacing: 0.01em; }
  header span { font-size: 13px; color: var(--text-dim); margin-left: auto; }

  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  aside {
    width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 12px 0;
  }

  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    padding: 8px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    font-size: 13px;
    color: var(--text);
    user-select: none;
  }

  .nav-item:hover { background: var(--bg3); color: #c0caf5; }

  .nav-item.active {
    background: var(--bg3);
    border-left-color: var(--accent);
    color: var(--accent);
  }

  .nav-item .icon { font-size: 12px; opacity: 0.6; width: 14px; flex-shrink: 0; }
  .nav-item .desc { font-size: 11px; color: var(--text-dim); display: block; margin-top: 1px; }

  .nav-item.active .desc { color: #5a7fcf; }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .doc-header {
    padding: 16px 28px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    flex-shrink: 0;
  }

  .doc-header h2 { font-size: 16px; font-weight: 600; color: #c0caf5; }
  .doc-header p { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

  .doc-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

  .doc-content::-webkit-scrollbar { width: 6px; }
  .doc-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-dim);
  }

  .welcome .big-icon { font-size: 48px; opacity: 0.3; }
  .welcome h3 { font-size: 18px; color: var(--text); font-weight: 600; }
  .welcome p { font-size: 13px; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--text-dim); font-size: 13px; gap: 8px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Markdown rendered output */
  .md { line-height: 1.7; font-size: 14px; max-width: 820px; }

  .md h1 { font-size: 22px; font-weight: 700; color: #c0caf5; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .md h2 { font-size: 17px; font-weight: 600; color: #c0caf5; margin: 28px 0 10px; }
  .md h3 { font-size: 14px; font-weight: 600; color: var(--cyan); margin: 20px 0 8px; }
  .md h4 { font-size: 13px; font-weight: 600; color: var(--accent2); margin: 16px 0 6px; }

  .md p { margin: 0 0 12px; }
  .md strong { color: #c0caf5; font-weight: 600; }
  .md em { color: var(--yellow); font-style: italic; }

  .md ul, .md ol { padding-left: 20px; margin: 0 0 12px; }
  .md li { margin: 4px 0; }

  .md code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    color: var(--green);
  }

  .md pre {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 12px 0;
  }

  .md pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12.5px;
    color: #a9b1d6;
  }

  .md blockquote {
    border-left: 3px solid var(--accent2);
    margin: 12px 0;
    padding: 8px 14px;
    background: var(--bg3);
    border-radius: 0 6px 6px 0;
    color: var(--text-dim);
  }

  .md table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }

  .md th {
    background: var(--bg3);
    color: var(--accent);
    padding: 8px 12px;
    text-align: left;
    border: 1px solid var(--border);
    font-weight: 600;
  }

  .md td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
  }

  .md tr:nth-child(even) td { background: rgba(31,35,53,0.4); }

  .md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .md a { color: var(--accent); text-decoration: none; }
  .md a:hover { text-decoration: underline; }

  .error-msg {
    background: rgba(247,118,142,0.1);
    border: 1px solid rgba(247,118,142,0.3);
    border-radius: 8px;
    padding: 16px;
    color: var(--red);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">F</div>
  <h1>FleetScheduler Pro — Planning Documentation</h1>
  <span>2026-03-21</span>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <div class="doc-header" id="docHeader" style="display:none">
      <h2 id="docTitle"></h2>
      <p id="docDesc"></p>
    </div>
    <div class="doc-content" id="docContent">
      <div class="welcome">
        <div class="big-icon">📋</div>
        <h3>Planning Documentation</h3>
        <p>Select a document from the sidebar to view it.</p>
      </div>
    </div>
  </main>
</div>

<script>
const docs = [
  {
    section: 'Project',
    items: [
      { id: 'project',      label: 'Project Overview',  file: 'PROJECT.md',      desc: 'Multi-tenant fleet management SaaS vision & core value' },
      { id: 'requirements', label: 'Requirements',      file: 'REQUIREMENTS.md', desc: 'v1 feature requirements mapped to roadmap phases' },
      { id: 'roadmap',      label: 'Roadmap',           file: 'ROADMAP.md',      desc: 'Phase-by-phase plan to v1.0 production release' },
      { id: 'state',        label: 'Project State',     file: 'STATE.md',        desc: 'Current focus: Phase 1 — Foundation & Security Hardening' },
    ]
  },
  {
    section: 'Research',
    items: [
      { id: 'r-stack',    label: 'Stack Research',    file: 'research/STACK.md',        desc: 'Technology choices with confidence ratings & tradeoffs' },
      { id: 'r-features', label: 'Feature Landscape', file: 'research/FEATURES.md',     desc: 'Competitor analysis: ServiceTitan, Jobber, Housecall Pro' },
      { id: 'r-arch',     label: 'Architecture',      file: 'research/ARCHITECTURE.md', desc: 'SaaS architecture patterns for vehicle scheduling' },
      { id: 'r-pitfalls', label: 'Pitfalls',          file: 'research/PITFALLS.md',     desc: 'Critical domain pitfalls grounded in the actual codebase' },
    ]
  },
  {
    section: 'Codebase',
    items: [
      { id: 'c-stack',    label: 'Tech Stack',     file: 'codebase/STACK.md',        desc: 'Node.js + Dart/Flutter + MySQL — languages, frameworks, tools' },
      { id: 'c-arch',     label: 'Architecture',   file: 'codebase/ARCHITECTURE.md', desc: 'Three-tier client-server with RBAC, Controllers→Services→Models' },
      { id: 'c-struct',   label: 'Structure',      file: 'codebase/STRUCTURE.md',    desc: 'Directory layout for backend, Flutter app, and DB scripts' },
      { id: 'c-conv',     label: 'Conventions',    file: 'codebase/CONVENTIONS.md',  desc: 'Naming patterns, code style, and file organisation rules' },
      { id: 'c-testing',  label: 'Testing',        file: 'codebase/TESTING.md',      desc: 'Test framework status — currently none configured' },
      { id: 'c-int',      label: 'Integrations',   file: 'codebase/INTEGRATIONS.md', desc: 'Google Maps, push notifications, and external API usage' },
      { id: 'c-concerns', label: 'Concerns',       file: 'codebase/CONCERNS.md',     desc: 'Tech debt, bugs, and known architectural concerns' },
    ]
  }
];

// Build sidebar
const sidebar = document.getElementById('sidebar');
let activeId = null;

docs.forEach(section => {
  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = section.section;
  sidebar.appendChild(label);

  section.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.id = 'nav-' + item.id;
    el.innerHTML = `<span class="icon">&#9656;</span><span><b style="font-size:13px">${item.label}</b><span class="desc">${item.desc}</span></span>`;
    el.addEventListener('click', () => loadDoc(item));
    sidebar.appendChild(el);
  });
});

// Simple markdown renderer
function renderMarkdown(md) {
  let html = md
    // Escape HTML first
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Fenced code blocks
    .replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) =>
      `<pre><code>${code.trimEnd()}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Headings
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold / italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // HR
    .replace(/^---+$/gm, '<hr>')
    // Blockquotes
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // Tables
    .replace(/^\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm, (_, header, rows) => {
      const ths = header.split('|').map(c => c.trim()).filter(Boolean)
        .map(c => `<th>${c}</th>`).join('');
      const trs = rows.trim().split('\n').map(row => {
        const tds = row.split('|').map(c => c.trim()).filter(Boolean)
          .map(c => `<td>${c}</td>`).join('');
        return `<tr>${tds}</tr>`;
      }).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    })
    // Unordered lists
    .replace(/((?:^[-*+] .+\n?)+)/gm, match => {
      const items = match.trim().split('\n')
        .map(l => `<li>${l.replace(/^[-*+] /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    })
    // Ordered lists
    .replace(/((?:^\d+\. .+\n?)+)/gm, match => {
      const items = match.trim().split('\n')
        .map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    })
    // Paragraphs (blank-line separated)
    .replace(/^(?!<[a-z]|$)(.+)$/gm, '<p>$1</p>');

  return html;
}

async function loadDoc(item) {
  // Update active state
  if (activeId) {
    const prev = document.getElementById('nav-' + activeId);
    if (prev) prev.classList.remove('active');
  }
  activeId = item.id;
  document.getElementById('nav-' + item.id).classList.add('active');

  // Update header
  document.getElementById('docHeader').style.display = '';
  document.getElementById('docTitle').textContent = item.label;
  document.getElementById('docDesc').textContent = item.file;

  // Show loader
  document.getElementById('docContent').innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading ' + item.file + '…</div>';

  try {
    const res = await fetch(item.file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const html = renderMarkdown(text);
    document.getElementById('docContent').innerHTML = `<div class="md">${html}</div>`;
  } catch (err) {
    document.getElementById('docContent').innerHTML =
      `<div class="error-msg"><strong>Could not load file:</strong> ${item.file}<br><br>
       Open this page via a local server (e.g. <code>npx serve .planning</code>) so fetch() can read local files.
       <br><br>Error: ${err.message}</div>`;
  }
}
</script>
</body>
</html>
